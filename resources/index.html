<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light dark">
    <title>ndifftool</title>
    <!-- CodeMirror CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/merge/merge.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <button onclick="moveSelectedLines('left')">← Left</button>
        <button onclick="moveSelectedLines('right')">Right →</button>
        <span id="file-info"></span>
        <button id="save-btn" onclick="saveResult()" style="float: right;">Save</button>
      </div>
      <div id="editor-container">
        <!-- Diff/Merge view will be rendered here -->
      </div>
    </div>

    <!-- Save Confirmation Modal -->
    <div id="save-modal" class="modal">
      <div class="modal-content">
        <h3>Save Modified Files?</h3>
        <p>The following files have been modified. Select the ones you want to save:</p>
        <div id="modified-files-list"></div>
        <div class="modal-buttons">
          <button id="modal-save-btn">Save & Exit</button>
          <button id="modal-discard-btn">Discard & Exit</button>
          <button id="modal-cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Dependencies -->
    <script src="js/diff_match_patch.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/merge/merge.min.js"></script>
    
    <!-- Neutralino Client SDK -->
    <script src="/neutralino.js"></script>
    <!-- Main App Logic -->
    <script src="js/main.js"></script>
  </body>
</html>
